name: India Thinks — Twice-Daily Post

on:
  schedule:
    - cron: "30 3 * * *"   # 9:00 AM IST — morning post
    - cron: "30 12 * * *"  # 6:00 PM IST — evening post
  workflow_dispatch:
    inputs:
      slot:
        description: "Which slot to run"
        required: true
        default: morning
        type: choice
        options: [morning, evening]

permissions:
  contents: write
  issues: write   # only used to open an issue if a run fails

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  determine-slot:
    runs-on: ubuntu-latest
    outputs:
      slot: ${{ steps.pick.outputs.slot }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 3 * * *" ]; then
            echo "slot=morning" >> "$GITHUB_OUTPUT"
          else
            echo "slot=evening" >> "$GITHUB_OUTPUT"
          fi

  daily-post:
    needs: determine-slot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SLOT: ${{ needs.determine-slot.outputs.slot }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate content and render images (${{ env.SLOT }})
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_URL: ${{ vars.BLOG_URL }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          USE_AI_IMAGES: ${{ vars.USE_AI_IMAGES }}
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
          OPENAI_IMAGE_SIZE: ${{ vars.OPENAI_IMAGE_SIZE }}
          OPENAI_IMAGE_QUALITY: ${{ vars.OPENAI_IMAGE_QUALITY }}
        run: python main.py prepare "$SLOT"

      - name: Commit and push images and blog post
        run: |
          git config user.name "india-thinks-bot"
          git config user.email "bot@users.noreply.github.com"
          # One-time cleanup: if package files were committed by an older
          # version of this workflow, untrack them (now gitignored). Safe
          # no-op on repos where they were never tracked.
          git rm --cached --ignore-unmatch -q output/package-*.json || true
          git add output/ blog/
          git commit -m "${SLOT} post $(date +%F)" || { echo "Nothing to commit — exiting."; exit 0; }
          pushed=0
          for i in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push; then
              pushed=1
              break
            fi
            # A conflicted rebase leaves the repo mid-rebase with conflict
            # markers written into files on disk — abort to restore a clean
            # tree before retrying (or before giving up).
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
          if [ "$pushed" -ne 1 ]; then
            echo "::error::Could not push after 3 attempts — failing loudly instead of continuing with a possibly corrupted working tree."
            exit 1
          fi

      - name: Publish to Telegram (${{ env.SLOT }})
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          BLOG_URL: ${{ vars.BLOG_URL }}
        run: python main.py publish "$SLOT"

      - name: Open an issue if this run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${process.env.SLOT} post failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The ${process.env.SLOT} India Thinks workflow failed.\n\nSee the run log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["automation-failure"],
            });
